<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Security Management — Quiz</title>
    <style>
      :root {
        --bg: #0a0f14;
        --panel: #10171f;
        --panel-2: #141d27;
        --line: #223040;
        --text: #dce6ef;
        --muted: #7d94a8;
        --accent: #3ddc84;
        --accent-dim: #23543a;
        --warn: #ffb454;
        --bad: #ff5d6c;
        --bad-dim: #4a2229;
        --good-dim: #1c4531;
        --mono: "SF Mono", "Consolas", "Menlo", "Courier New", monospace;
        --sans: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background:
          radial-gradient(
            1200px 600px at 15% -10%,
            rgba(61, 220, 132, 0.06),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 100% 10%,
            rgba(255, 180, 84, 0.05),
            transparent 55%
          ),
          var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 32px 16px 64px;
      }
      .app {
        width: 100%;
        max-width: 760px;
      }

      /* Header / scanline strip */
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
      }
      .brand .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
      }
      .brand-text {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.12em;
        color: var(--muted);
        text-transform: uppercase;
      }

      h1 {
        font-family: var(--mono);
        font-size: clamp(22px, 4vw, 30px);
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 4px;
        color: var(--text);
      }
      h1 span {
        color: var(--accent);
      }
      .subtitle {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 28px;
      }

      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 28px;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        opacity: 0.5;
      }

      /* Start screen */
      .start-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin: 22px 0 26px;
      }
      .stat {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 12px;
        text-align: center;
        background: rgba(255, 255, 255, 0.015);
      }
      .stat .num {
        font-family: var(--mono);
        font-size: 22px;
        color: var(--accent);
      }
      .stat .lbl {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      button {
        font-family: var(--sans);
        cursor: pointer;
        border: none;
        border-radius: 10px;
      }
      .btn-primary {
        background: var(--accent);
        color: #06170e;
        font-weight: 700;
        font-size: 15px;
        padding: 14px 22px;
        width: 100%;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease;
        box-shadow: 0 0 0 rgba(61, 220, 132, 0);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(61, 220, 132, 0.18);
      }
      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-ghost {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
        padding: 11px 18px;
        font-size: 14px;
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Quiz screen */
      .progress-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }
      .progress-bar {
        height: 6px;
        background: var(--line);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 24px;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #6be6a8);
        border-radius: 4px;
        transition: width 0.25s ease;
      }

      .tally {
        display: flex;
        gap: 14px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .tally .ok {
        color: var(--accent);
      }
      .tally .bad {
        color: var(--bad);
      }

      .q-cat {
        display: inline-block;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--warn);
        border: 1px solid rgba(255, 180, 84, 0.35);
        background: rgba(255, 180, 84, 0.06);
        padding: 3px 9px;
        border-radius: 20px;
        margin-bottom: 14px;
        letter-spacing: 0.04em;
      }
      .q-text {
        font-size: 18px;
        line-height: 1.5;
        margin: 0 0 22px;
        font-weight: 600;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .option {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        text-align: left;
        padding: 13px 15px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.012);
        color: var(--text);
        font-size: 14.5px;
        line-height: 1.4;
        border-radius: 10px;
        transition:
          border-color 0.12s ease,
          background 0.12s ease;
      }
      .option:hover:not(:disabled) {
        border-color: #3a4c60;
        background: rgba(255, 255, 255, 0.03);
      }
      .option .letter {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 6px;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .option.correct {
        border-color: var(--accent);
        background: var(--good-dim);
      }
      .option.correct .letter {
        border-color: var(--accent);
        color: var(--accent);
      }
      .option.wrong {
        border-color: var(--bad);
        background: var(--bad-dim);
      }
      .option.wrong .letter {
        border-color: var(--bad);
        color: var(--bad);
      }
      .option:disabled {
        cursor: default;
        opacity: 0.92;
      }
      .option.dim {
        opacity: 0.45;
      }

      .next-row {
        display: flex;
        justify-content: flex-end;
        margin-top: 22px;
        min-height: 44px;
      }

      /* Results */
      .score-hero {
        text-align: center;
        padding: 10px 0 6px;
      }
      .score-num {
        font-family: var(--mono);
        font-size: 56px;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
      }
      .score-sub {
        color: var(--muted);
        font-size: 14px;
        margin-top: 8px;
      }

      .result-tabs {
        display: flex;
        gap: 8px;
        margin: 26px 0 16px;
      }
      .tab {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12.5px;
        letter-spacing: 0.03em;
      }
      .tab.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(61, 220, 132, 0.06);
      }

      .review-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 520px;
        overflow-y: auto;
        padding-right: 4px;
      }
      .review-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.012);
      }
      .review-item.wrong {
        border-left: 3px solid var(--bad);
      }
      .review-item.correct {
        border-left: 3px solid var(--accent);
      }
      .review-q {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .review-line {
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
      }
      .review-line b {
        color: var(--text);
        font-weight: 600;
      }
      .review-line.your-wrong b {
        color: var(--bad);
      }
      .review-line.correct-ans b {
        color: var(--accent);
      }

      .empty-note {
        color: var(--muted);
        font-size: 13.5px;
        text-align: center;
        padding: 30px 10px;
      }

      .footer-actions {
        display: flex;
        gap: 10px;
        margin-top: 22px;
      }
      .footer-actions .btn-ghost {
        flex: 1;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: 8px;
      }

      @media (max-width: 480px) {
        .card {
          padding: 20px;
        }
        .start-grid {
          grid-template-columns: 1fr 1fr 1fr;
          gap: 8px;
        }
        .score-num {
          font-size: 44px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="brand">
        <div class="dot"></div>
        <div class="brand-text">CBK Domain Trainer</div>
      </div>
      <h1>System Security <span>Management</span></h1>
      <div class="subtitle">
        Terminology &amp; concept drills — randomized every run.
      </div>

      <div class="card" id="card"></div>
    </div>

    <script>
      /* ---------------------------------------------------------
   QUESTION BANK — sourced from "System Security Management"
--------------------------------------------------------- */
      const QUESTIONS = [
        {
          cat: "Terminology",
          q: 'In information security, "Access" refers to:',
          options: [
            "The organizational resource that is being protected",
            "A subject or object's ability to use, manipulate, modify, or affect another subject or object",
            "A single instance of being open to damage",
            "The probability that something can happen",
          ],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: 'Which term describes "the organizational resource that is being protected"?',
          options: ["Asset", "Exposure", "Vulnerability", "Threat"],
          correct: 0,
        },
        {
          cat: "Terminology",
          q: "An intentional or unintentional attempt to cause damage or compromise to information or systems is called a(n):",
          options: ["Exploit", "Attack", "Vulnerability", "Control"],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: "Security mechanisms, policies, or procedures that counter attacks and reduce risk are collectively known as:",
          options: [
            "Threats",
            "Exploits",
            "Controls, Safeguards, or Countermeasures",
            "Exposures",
          ],
          correct: 2,
        },
        {
          cat: "Terminology",
          q: '"To take advantage of weaknesses or vulnerability in a system" defines:',
          options: ["Exploit", "Hack", "Compromise", "Loss"],
          correct: 0,
        },
        {
          cat: "Terminology",
          q: 'Which term means "a single instance of being open to damage"?',
          options: ["Risk", "Exposure", "Vulnerability", "Threat"],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: 'In the "bad" sense described in the notes, to "hack" means to:',
          options: [
            "Illegally gain access to a computer or system",
            "Patch a known vulnerability",
            "Perform a formal risk assessment",
            "Deploy a perimeter firewall",
          ],
          correct: 0,
        },
        {
          cat: "Terminology",
          q: 'A "passive entity in the information system that receives or contains information" is called a(n):',
          options: ["Subject", "Object", "Agent", "Asset"],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: 'An "active entity that interacts with an information system and causes information to move through the system" is called a:',
          options: ["Object", "Subject", "Vulnerability", "Control"],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: '"The probability that something can happen" defines:',
          options: ["Threat", "Risk", "Exposure", "Vulnerability"],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: "A category of objects, persons, or entities that represents a potential danger to an asset is called a:",
          options: ["Vulnerability", "Threat", "Exploit", "Exposure"],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: "A specific instance or component of a more general threat is called a:",
          options: ["Threat Agent", "Vulnerability", "Risk", "Exposure"],
          correct: 0,
        },
        {
          cat: "Terminology",
          q: '"Weaknesses or faults in a system or protection mechanism that expose information to attack or damage" is the definition of:',
          options: ["Risk", "Vulnerability", "Threat", "Exposure"],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: "A compromise occurs when:",
          options: [
            "A vulnerability is patched",
            "An attack is successful",
            "A policy is written",
            "A system is audited",
          ],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: "The plan for the implementation of new security measures in an organization is called the:",
          options: [
            "Security Model",
            "Security Blueprint",
            "Security Posture",
            "CBK",
          ],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: "A collection of specific security rules representing the implementation of a security policy is a:",
          options: [
            "Security Blueprint",
            "Security Model",
            "Security Posture",
            "Countermeasure",
          ],
          correct: 1,
        },
        {
          cat: "Terminology",
          q: "The general label for the combination of all policies, procedures, technologies, and programs currently in place is called the:",
          options: [
            "Security Blueprint",
            "Security Model",
            "Security Posture (or Profile)",
            "CBK",
          ],
          correct: 2,
        },
        {
          cat: "Attacks",
          q: "Eavesdropping is an example of what type of attack?",
          options: ["Active", "Passive", "Fabrication", "Modification"],
          correct: 1,
        },
        {
          cat: "Attacks",
          q: "Password guessing and Denial-of-Service (DoS) are examples of:",
          options: [
            "Passive attacks",
            "Active attacks",
            "Deterrent controls",
            "Recovery measures",
          ],
          correct: 1,
        },
        {
          cat: "Attacks",
          q: "When a computer is used as an active tool to conduct an attack, it is considered the ______ of the attack.",
          options: ["Object", "Subject", "Target", "Victim"],
          correct: 1,
        },
        {
          cat: "Attacks",
          q: "When a computer is the entity being attacked, it is considered the ______ of the attack.",
          options: ["Subject", "Object", "Agent", "Controller"],
          correct: 1,
        },
        {
          cat: "The Three Ds",
          q: 'Which of the "three Ds of security" involves protecting assets first and analyzing network areas before adopting protective efforts?',
          options: ["Deterrence", "Detection", "Defense", "Delegation"],
          correct: 2,
        },
        {
          cat: "The Three Ds",
          q: "Which security measure aims to reduce the frequency of security compromises by making attackers expend more effort and risk discovery?",
          options: ["Defense", "Deterrence", "Detection", "Recovery"],
          correct: 1,
        },
        {
          cat: "The Three Ds",
          q: "Which of the three Ds is described as sounding the alarm when security is violated?",
          options: ["Defense", "Deterrence", "Detection", "Prevention"],
          correct: 2,
        },
        {
          cat: "Controls",
          q: "Firewalls, access lists in routers, spam filters, and virus filters are examples of:",
          options: [
            "Deterrent controls",
            "Defensive controls",
            "Detective controls",
            "Corrective controls",
          ],
          correct: 1,
        },
        {
          cat: "Controls",
          q: "Posting notices of monitored internet activity and displaying visitor IP addresses are examples of:",
          options: [
            "Defensive controls",
            "Deterrent controls",
            "Detective controls",
            "Preventive controls",
          ],
          correct: 1,
        },
        {
          cat: "Controls",
          q: "Audit trails, log files, and intrusion detection systems are examples of:",
          options: [
            "Defensive controls",
            "Deterrent controls",
            "Detective controls",
            "Recovery controls",
          ],
          correct: 2,
        },
        {
          cat: "Functional Areas",
          q: "Which of the following is NOT one of the five functional areas used to categorize security in the notes?",
          options: ["Risk avoidance", "Deterrence", "Encryption", "Recovery"],
          correct: 2,
        },
        {
          cat: "Functional Areas",
          q: "Identifying what value and risk each system component has, and reducing the likelihood of damaging behavior, describes:",
          options: ["Risk Avoidance", "Prevention", "Detection", "Recovery"],
          correct: 0,
        },
        {
          cat: "Functional Areas",
          q: "The functional area concerned with how an organization continues operations despite natural or human-created disruptions is:",
          options: ["Detection", "Prevention", "Recovery", "Deterrence"],
          correct: 2,
        },
        {
          cat: "Functional Areas",
          q: 'The area historically called "disaster recovery" is increasingly referred to today as:',
          options: [
            "Risk avoidance",
            "Business continuity",
            "Deterrence",
            "Prevention",
          ],
          correct: 1,
        },
        {
          cat: "CBK",
          q: "What does CBK stand for in the context of information security?",
          options: [
            "Certified Business Knowledge",
            "Common Body of Knowledge",
            "Core Baseline Kit",
            "Compliance Best-practice Key",
          ],
          correct: 1,
        },
        {
          cat: "CBK",
          q: "Which of the following is one of the CBK Security Domains listed in the notes?",
          options: [
            "Cryptography",
            "Social media marketing",
            "Product design",
            "Customer relations",
          ],
          correct: 0,
        },
        {
          cat: "CBK",
          q: "Which of these is NOT listed among the CBK security domains?",
          options: [
            "Cryptography",
            "Physical security",
            "Graphic design",
            "Operations security",
          ],
          correct: 2,
        },
        {
          cat: "Classes of Threats",
          q: "A Denial-of-Service (DoS) attack is an example of which class of threat?",
          options: [
            "Interception",
            "Modification",
            "Interruption (Disruption)",
            "Fabrication",
          ],
          correct: 2,
        },
        {
          cat: "Classes of Threats",
          q: "The unauthorized interception of information is known as:",
          options: ["Spoofing", "Snooping", "Fabrication", "Usurpation"],
          correct: 1,
        },
        {
          cat: "Classes of Threats",
          q: "An impersonation of one entity by another is called:",
          options: [
            "Fabrication",
            "Masquerading (or spoofing)",
            "Snooping",
            "Usurpation",
          ],
          correct: 1,
        },
        {
          cat: "Classes of Threats",
          q: "When an unauthorized party inserts fake objects into a system, this is classified as:",
          options: [
            "Interruption",
            "Interception",
            "Modification",
            "Fabrication",
          ],
          correct: 3,
        },
        {
          cat: "Classes of Threats",
          q: "When an unauthorized party gains access to AND modifies an asset, this is classified as:",
          options: [
            "Interruption",
            "Modification",
            "Fabrication",
            "Interception",
          ],
          correct: 1,
        },
        {
          cat: "Scope of Security",
          q: "According to the scope of computer security, the major threat to hardware assets is primarily a threat to:",
          options: [
            "Confidentiality",
            "Availability",
            "Integrity",
            "Accountability",
          ],
          correct: 1,
        },
        {
          cat: "Scope of Security",
          q: "A virus or worm that alters software so it still functions but behaves differently than before is primarily a threat to:",
          options: [
            "Availability",
            "Integrity/Authenticity",
            "Confidentiality",
            "Accountability",
          ],
          correct: 1,
        },
        {
          cat: "Policy & Mechanisms",
          q: 'In security terminology, "policy" refers to:',
          options: [
            "The technical controls that enforce rules",
            "What is and is not allowed, defining security for a system",
            "The set of reachable system states",
            "A disaster recovery plan",
          ],
          correct: 1,
        },
        {
          cat: "Policy & Mechanisms",
          q: "Mechanisms in security are best described as the means that:",
          options: [
            "Define what is allowed",
            "Enforce policies",
            "Assess financial risk",
            "Train employees on etiquette",
          ],
          correct: 1,
        },
        {
          cat: "Policy & Mechanisms",
          q: "When two security policies conflict with one another, the result may be:",
          options: [
            "Improved operational efficiency",
            "Security vulnerabilities from inconsistencies",
            "Stronger encryption by default",
            "Reduced auditing costs",
          ],
          correct: 1,
        },
        {
          cat: "Goals of Security",
          q: "Which goal of security aims to stop attackers from violating a security policy before it happens?",
          options: ["Detection", "Prevention", "Recovery", "Deterrence"],
          correct: 1,
        },
        {
          cat: "Goals of Security",
          q: "Which security goal involves identifying that a violation of policy has occurred or is underway and reporting it?",
          options: ["Prevention", "Detection", "Recovery", "Assurance"],
          correct: 1,
        },
        {
          cat: "Goals of Security",
          q: "Which security goal involves stopping an attack, assessing damage, and continuing to function correctly even after an attack succeeds?",
          options: ["Prevention", "Detection", "Recovery", "Deterrence"],
          correct: 2,
        },
        {
          cat: "Goals of Security",
          q: "A system that continues to function correctly, possibly with degraded service, even during an attack is described as:",
          options: [
            "Fault-free",
            "Intrusion tolerant",
            "Risk averse",
            "Fully secure",
          ],
          correct: 1,
        },
        {
          cat: "Types of Mechanisms",
          q: 'In the classification of security mechanism types, a "secure" system is one where:',
          options: [
            "All reachable states are within the set of secure states",
            "All secure states are reachable",
            "Some non-secure states are reachable",
            "No states are reachable",
          ],
          correct: 0,
        },
        {
          cat: "Types of Mechanisms",
          q: 'A "precise" system, in terms of security mechanism types, is one where:',
          options: [
            "Some non-secure states are reachable",
            "All reachable states are secure and all secure states are reachable",
            "No secure states are reachable",
            "Only non-secure states are reachable",
          ],
          correct: 1,
        },
        {
          cat: "Types of Mechanisms",
          q: 'A "broad" system is considered not secure because:',
          options: [
            "It has no reachable states",
            "Some non-secure states are reachable",
            "All secure states are reachable",
            "It restricts access too heavily",
          ],
          correct: 1,
        },
        {
          cat: "Assurance",
          q: '"Assurance" in security is best defined as:',
          options: [
            "A guarantee that no attacks will ever occur",
            "A measure of how well a system meets its requirements",
            "The total cost of implementing security",
            "A specific encryption algorithm",
          ],
          correct: 1,
        },
        {
          cat: "Assurance",
          q: 'Which component of assurance is described as "a statement of desired functionality" resulting from requirements analysis?',
          options: ["Design", "Specification", "Implementation", "Operation"],
          correct: 1,
        },
        {
          cat: "Assurance",
          q: "Which assurance component describes how a system will meet its specification?",
          options: ["Specification", "Design", "Implementation", "Assurance"],
          correct: 1,
        },
        {
          cat: "Assurance",
          q: "Which assurance component refers to the actual programs and systems that carry out the design?",
          options: ["Specification", "Design", "Implementation", "Operation"],
          correct: 2,
        },
        {
          cat: "Operational Issues",
          q: "Weighing whether it is cheaper to prevent an incident or to recover from it falls under which operational issue?",
          options: [
            "Risk Analysis",
            "Cost-Benefit Analysis",
            "Laws and Customs",
            "Human Issues",
          ],
          correct: 1,
        },
        {
          cat: "Operational Issues",
          q: "Determining what should be protected and how much protection it needs falls under:",
          options: [
            "Cost-Benefit Analysis",
            "Risk Analysis",
            "Laws and Customs",
            "Assurance",
          ],
          correct: 1,
        },
        {
          cat: "Operational Issues",
          q: "Considering whether a desired security measure is illegal, or whether people will actually follow it, falls under:",
          options: [
            "Cost-Benefit Analysis",
            "Risk Analysis",
            "Laws and Customs",
            "Recovery",
          ],
          correct: 2,
        },
        {
          cat: "Human Issues",
          q: "Studies speculate that insiders account for roughly what percentage of all security problems?",
          options: ["10-20%", "30-40%", "50-60%", "80-90%"],
          correct: 3,
        },
        {
          cat: "Human Issues",
          q: "Lying or manipulating people to gain unauthorized access or information, especially effective against inexperienced staff, is known as:",
          options: ["Social engineering", "Snooping", "Spoofing", "Usurpation"],
          correct: 0,
        },
        {
          cat: "Human Issues",
          q: "People who have authorized access to a system but use its data or resources in unauthorized ways are called:",
          options: ["Outsiders", "Insiders", "Threat agents", "Auditors"],
          correct: 1,
        },
        {
          cat: "Situational",
          q: "An attacker sends emails that appear to come from the finance manager, asking staff to approve a wire transfer. This is best classified as an example of:",
          options: [
            "Snooping",
            "Masquerading / Spoofing",
            "Fabrication of a new asset",
            "Usurpation of hardware",
          ],
          correct: 1,
        },
        {
          cat: "Situational",
          q: "An employee silently monitors network traffic, capturing passwords without altering or interacting with any data. This is an example of a:",
          options: [
            "Passive attack",
            "Active attack",
            "Deterrent control",
            "Detective control",
          ],
          correct: 0,
        },
        {
          cat: "Situational",
          q: 'A retail chain posts signs stating "All network activity is monitored and logged" throughout its offices, mainly to:',
          options: [
            "Technically prevent all intrusions",
            "Deter potential attackers from acting",
            "Automatically detect attacks in progress",
            "Recover lost data after a breach",
          ],
          correct: 1,
        },
        {
          cat: "Situational",
          q: "During a routine audit, an administrator finds and disables several old, unused accounts before they can be exploited. This action is best described as an example of:",
          options: ["Detection", "Risk avoidance", "Recovery", "Deterrence"],
          correct: 1,
        },
        {
          cat: "Situational",
          q: "After ransomware encrypts company files, the IT team restores systems from backup and resumes normal operations. This response primarily reflects the security goal of:",
          options: ["Prevention", "Detection", "Recovery", "Deterrence"],
          correct: 2,
        },
        {
          cat: "Situational",
          q: "A firewall silently blocks an intrusion attempt before it ever reaches the internal network. This is best classified as a:",
          options: [
            "Deterrent control",
            "Defensive control",
            "Detective control",
            "Corrective control",
          ],
          correct: 1,
        },
        {
          cat: "Situational",
          q: "Weeks after a former employee's departure, audit logs reveal they accessed confidential files using old credentials. This delayed discovery illustrates a weakness in which of the three Ds?",
          options: ["Defense", "Deterrence", "Detection", "Recovery"],
          correct: 2,
        },
        {
          cat: "Situational",
          q: "A hospital IT team debates whether encrypting every archived record is worth the added server cost versus the potential cost of a future breach. This weighing of cost against protection is an example of:",
          options: [
            "Risk Analysis",
            "Cost-Benefit Analysis",
            "Laws and Customs",
            "Human Issues",
          ],
          correct: 1,
        },
      ];

      /* ---------------------------------------------------------
   STATE
--------------------------------------------------------- */
      let order = []; // shuffled question indices for this run
      let optionOrders = []; // per-question shuffled option index arrays
      let current = 0;
      let answers = []; // {qIndex, chosenOptIndex, correct}
      let locked = false;

      const card = document.getElementById("card");

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function newRun() {
        order = shuffle(QUESTIONS.map((_, i) => i));
        optionOrders = order.map((qi) =>
          shuffle(QUESTIONS[qi].options.map((_, i) => i)),
        );
        current = 0;
        answers = [];
        locked = false;
        renderStart();
      }

      function renderStart() {
        card.innerHTML = `
    <div class="q-cat" style="margin-bottom:16px;">${QUESTIONS.length} QUESTIONS &middot; RANDOMIZED</div>
    <div style="font-size:15px; color:var(--muted); line-height:1.6;">
      Multiple-choice drill covering terminology and concepts from <b style="color:var(--text)">System Security Management</b> —
      key terms, the three Ds, threat classes, CBK domains, security goals, and a few scenario-based questions.
      Order and answer positions are shuffled every attempt.
    </div>
    <div class="start-grid">
      <div class="stat"><div class="num">${QUESTIONS.length}</div><div class="lbl">Questions</div></div>
      <div class="stat"><div class="num">4</div><div class="lbl">Choices each</div></div>
      <div class="stat"><div class="num">&infin;</div><div class="lbl">Retakes</div></div>
    </div>
    <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
  `;
      }

      function startQuiz() {
        current = 0;
        answers = [];
        renderQuestion();
      }

      function renderQuestion() {
        locked = false;
        const qi = order[current];
        const question = QUESTIONS[qi];
        const optOrder = optionOrders[current];

        const correctCount = answers.filter((a) => a.correct).length;
        const wrongCount = answers.filter((a) => !a.correct).length;
        const pct = Math.round((current / QUESTIONS.length) * 100);

        const optionsHtml = optOrder
          .map((origIdx, pos) => {
            const letter = String.fromCharCode(65 + pos);
            return `<button class="option" data-orig="${origIdx}" onclick="selectAnswer(${origIdx}, this)">
      <span class="letter">${letter}</span><span>${question.options[origIdx]}</span>
    </button>`;
          })
          .join("");

        card.innerHTML = `
    <div class="progress-row">
      <span>QUESTION ${current + 1} / ${QUESTIONS.length}</span>
      <span class="tally"><span class="ok">&#10003; ${correctCount}</span><span class="bad">&#10007; ${wrongCount}</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-cat">${question.cat}</div>
    <p class="q-text">${question.q}</p>
    <div class="options" id="options">${optionsHtml}</div>
    <div class="next-row" id="nextRow"></div>
  `;
      }

      function selectAnswer(origIdx, btnEl) {
        if (locked) return;
        locked = true;
        const qi = order[current];
        const question = QUESTIONS[qi];
        const isCorrect = origIdx === question.correct;

        answers.push({
          qIndex: qi,
          chosenIdx: origIdx,
          correct: isCorrect,
        });

        document.querySelectorAll("#options .option").forEach((btn) => {
          btn.disabled = true;
          const orig = parseInt(btn.getAttribute("data-orig"));
          if (orig === question.correct) {
            btn.classList.add("correct");
          } else if (orig === origIdx) {
            btn.classList.add("wrong");
          } else {
            btn.classList.add("dim");
          }
        });

        const isLast = current === QUESTIONS.length - 1;
        document.getElementById("nextRow").innerHTML =
          `<button class="btn-primary" style="width:auto; padding:12px 26px;" onclick="advance()">${isLast ? "See Results" : "Next Question"}</button>`;
      }

      function advance() {
        if (current < QUESTIONS.length - 1) {
          current++;
          renderQuestion();
        } else {
          renderResults();
        }
      }

      let activeTab = "wrong";

      function renderResults() {
        const correctCount = answers.filter((a) => a.correct).length;
        const total = QUESTIONS.length;
        const pct = Math.round((correctCount / total) * 100);

        activeTab = correctCount === total ? "correct" : "wrong";

        card.innerHTML = `
    <div class="score-hero">
      <div class="score-num">${pct}%</div>
      <div class="score-sub">${correctCount} of ${total} correct</div>
    </div>
    <div class="result-tabs">
      <button class="tab" id="tabWrong" onclick="switchTab('wrong')">Missed (${total - correctCount})</button>
      <button class="tab" id="tabCorrect" onclick="switchTab('correct')">Correct (${correctCount})</button>
    </div>
    <div class="review-list" id="reviewList"></div>
    <div class="footer-actions">
      <button class="btn-ghost" onclick="newRun()">Restart Quiz</button>
    </div>
  `;
        switchTab(activeTab);
      }

      function switchTab(tab) {
        activeTab = tab;
        document
          .getElementById("tabWrong")
          .classList.toggle("active", tab === "wrong");
        document
          .getElementById("tabCorrect")
          .classList.toggle("active", tab === "correct");

        const list = answers.filter((a) =>
          tab === "wrong" ? !a.correct : a.correct,
        );
        const listEl = document.getElementById("reviewList");

        if (list.length === 0) {
          listEl.innerHTML = `<div class="empty-note">${tab === "wrong" ? "Nothing missed — clean sweep." : "No correct answers this round."}</div>`;
          return;
        }

        listEl.innerHTML = list
          .map((a) => {
            const question = QUESTIONS[a.qIndex];
            const yourAnswer = question.options[a.chosenIdx];
            const correctAnswer = question.options[question.correct];
            return `
      <div class="review-item ${a.correct ? "correct" : "wrong"}">
        <div class="q-cat" style="margin-bottom:8px;">${question.cat}</div>
        <div class="review-q">${question.q}</div>
        ${
          a.correct
            ? `<div class="review-line correct-ans">Your answer: <b>${yourAnswer}</b></div>`
            : `<div class="review-line your-wrong">Your answer: <b>${yourAnswer}</b></div>
             <div class="review-line correct-ans">Correct answer: <b>${correctAnswer}</b></div>`
        }
      </div>
    `;
          })
          .join("");
      }

      /* boot */
      newRun();
    </script>
  </body>
</html>
